{% extends 'base.html' %} {% block header %}
<h1>Edit Report</h1>
{% endblock %} {% block content %}
<form method="post">
  <label for="shark_type">Shark Type</label>
  <select name="shark_type" id="shark_type">
    {% for s in sharks %}
    <option {% if report.shark_type="" ="s" %}selected{% endif %}>
      {{ s }}
    </option>
    {% endfor %}
  </select>

  <label for="beach">Beach</label>
  <select name="beach" id="beach">
    {% for b in beaches %}
    <option {% if report.beach="" ="b" %}selected{% endif %}>{{ b }}</option>
    {% endfor %}
  </select>

  <label for="size">Size</label>
  <input name="size" id="size" value="{{ report.size }}" />

  <p>Danger Level: {{ report.danger_level }}</p>
  <!-- NEW -->

  <input type="submit" value="Save" />
</form>

<hr />

<form action="{{ url_for('report.delete', id=report.id) }}" method="post">
  <input
    class="danger"
    type="submit"
    value="Delete"
    onclick="return confirm('Are you sure?');"
  />
</form>
{% endblock %}
